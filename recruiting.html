<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hanse - Recruiting Board</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --line: rgba(15, 23, 42, .10);
            --text: #0b1220;
            --muted: #64748b;
            --navy: #0f172a;
            --blue: #2f5ea9;
            --radius: 16px;
            --shadow-sm: 0 6px 18px rgba(15, 23, 42, .08);
            --shadow-md: 0 18px 60px rgba(15, 23, 42, .12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: radial-gradient(900px 500px at 18% 0%, rgba(90, 167, 255, .16), transparent 60%),
                radial-gradient(900px 520px at 90% 15%, rgba(212, 165, 58, .12), transparent 58%),
                var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .recruiting-board {
            max-width: 100%;
            overflow-x: auto;
            padding: 10px 0;
        }

        .funnel {
            display: flex;
            gap: 16px;
            min-width: min-content;
        }

        .column {
            width: 280px;
            background: rgba(255, 255, 255, .95);
            border-radius: 16px;
            border: 1px solid rgba(15, 23, 42, .12);
            box-shadow: var(--shadow-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 60px);
        }

        .column-title {
            font-weight: 700;
            font-size: 13px;
            color: var(--navy);
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(15, 23, 42, .10);
        }

        .cards {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cards::-webkit-scrollbar {
            width: 5px
        }

        .cards::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, .20);
            border-radius: 3px
        }

        .lead-card {
            background: var(--surface);
            border: 1px solid rgba(15, 23, 42, .12);
            border-radius: 12px;
            padding: 12px;
            cursor: grab;
            transition: transform .12s, box-shadow .18s, border-color .18s;
        }

        .lead-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .10);
            border-color: rgba(47, 94, 169, .35);
        }

        .lead-card.dragging {
            opacity: 0.5
        }

        .lead-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .status-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ef4444;
            transition: background .3s;
        }

        .dot.complete {
            background: #10b981
        }

        .lead-name {
            font-weight: 700;
            font-size: 13px;
            color: var(--navy);
            flex: 1;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag.yellow {
            background: #fbbf24;
            color: #78350f
        }

        .tag.red {
            background: #ef4444;
            color: #fff
        }

        .tag.blue {
            background: #3b82f6;
            color: #fff
        }

        .tag.green {
            background: #10b981;
            color: #fff
        }

        .meta {
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
        }

        .meta.overdue {
            color: #ef4444;
            font-weight: 600
        }

        /* Modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .35);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex
        }

        .modal {
            width: 90%;
            max-width: 1300px;
            height: 90vh;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 25px 100px rgba(0, 0, 0, .30);
            display: grid;
            grid-template-columns: 1fr 400px;
            overflow: hidden;
            transform: scale(0.9);
            opacity: 0;
            transition: transform .3s, opacity .3s;
        }

        .modal-backdrop.open .modal {
            transform: scale(1);
            opacity: 1;
        }

        .modal-left {
            padding: 28px 32px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(15, 23, 42, .10);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--navy);
        }

        .close-btn {
            background: rgba(15, 23, 42, .06);
            border: 1px solid rgba(15, 23, 42, .10);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 18px;
            transition: background .2s;
        }

        .close-btn:hover {
            background: rgba(15, 23, 42, .12)
        }

        .top-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(15, 23, 42, .08);
        }

        .action-tag {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(15, 23, 42, .12);
            background: rgba(255, 255, 255, .9);
            transition: background .2s;
        }

        .action-tag:hover {
            background: rgba(47, 94, 169, .08)
        }

        .field {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .field-input,
        .field-select,
        .field-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(15, 23, 42, .12);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(15, 23, 42, .02);
            color: var(--text);
            font-family: inherit;
            transition: border-color .2s;
        }

        .field-input:focus,
        .field-select:focus,
        .field-textarea:focus {
            outline: none;
            border-color: rgba(47, 94, 169, .45);
            background: rgba(47, 94, 169, .04);
        }

        .field-textarea {
            resize: vertical;
            min-height: 60px
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--navy);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 24px 0 14px;
            padding-top: 20px;
            border-top: 1px solid rgba(15, 23, 42, .08);
        }

        .modal-right {
            background: rgba(30, 35, 48, .98);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(15, 23, 42, .12);
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .chat-title {
            color: rgba(255, 255, 255, .95);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .chat-icon {
            font-size: 52px;
            filter: drop-shadow(0 4px 12px rgba(90, 167, 255, .3));
        }

        .chat-prompt {
            font-size: 18px;
            font-weight: 600;
            color: #5aa7ff;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .08);
            border-radius: 10px;
            color: rgba(255, 255, 255, .95);
            font-size: 13px;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, .45)
        }

        .chat-send {
            color: #5aa7ff;
            font-size: 22px;
            cursor: pointer;
            transition: transform .2s;
        }

        .chat-send:hover {
            transform: scale(1.1)
        }

        .column.drag-over {
            background: rgba(90, 167, 255, .12);
            border-color: rgba(90, 167, 255, .45);
        }

        /* New Styles for Demo UI */
        .collapsible-section {
            border: 1px solid rgba(15, 23, 42, .08);
            border-radius: 12px;
            margin-bottom: 16px;
            background: #fafafa;
            overflow: hidden;
        }
        .collapsible-header {
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 800;
            color: var(--navy);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: var(--surface);
            border-bottom: 1px solid transparent;
            transition: background .2s, border-color .2s;
        }
        .collapsible-header:hover {
            background: #f1f5f9;
        }
        .collapsible-content {
            padding: 16px;
            display: none;
            background: var(--surface);
            border-top: 1px solid rgba(15, 23, 42, .08);
        }
        .collapsible-section.open .collapsible-content {
            display: block;
        }
        .collapsible-section.open .collapsible-header {
            border-bottom-color: rgba(15, 23, 42, .08);
        }

        .dnd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .dnd-zone {
            border: 2px dashed rgba(15, 23, 42, .2);
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .dnd-zone:hover, .dnd-zone.dragover {
            border-color: var(--blue);
            background: rgba(47, 94, 169, .05);
        }
        .dnd-icon {
            font-size: 20px;
            margin-bottom: 6px;
            color: var(--muted);
        }
        .dnd-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--navy);
        }

        .cdl-bracket {
            border: 2px dashed rgba(15, 23, 42, .2);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            transition: all .2s;
            margin-bottom: 16px;
            background: rgba(15, 23, 42, .02);
        }
        .cdl-bracket.dragover {
            background: var(--surface);
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(47, 94, 169, .1);
        }
        .cdl-bracket.dragover::after {
            content: 'DROP FILES HERE';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: var(--blue);
            border-radius: 14px;
            z-index: 10;
        }

        .nav-arrows {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .nav-btn {
            background: rgba(15, 23, 42, .06);
            border: 1px solid rgba(15, 23, 42, .10);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 16px;
            transition: background .2s;
            color: var(--navy);
        }
        .nav-btn:hover {
            background: rgba(15, 23, 42, .12);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .tag.purple { background: #8b5cf6; color: #fff; }
        .tag.teal { background: #14b8a6; color: #fff; }

        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .copy-btn {
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--blue);
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .copy-btn:hover {
            opacity: 0.9;
        }
        .master-forms-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: var(--navy);
            color: white;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            margin-top: 16px;
            border: none;
            transition: opacity .2s;
        }
        .master-forms-btn:hover {
            opacity: 0.9;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="recruiting-board">
        <div class="funnel" id="funnel"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal">
            <div class="modal-left">
                <div class="modal-header">
                    <div class="modal-title">Lead Details</div>
                    <div class="header-actions">
                        <div class="nav-arrows">
                            <button class="nav-btn" id="prevLeadBtn" title="Previous Lead">←</button>
                            <button class="nav-btn" id="nextLeadBtn" title="Next Lead">→</button>
                        </div>
                        <div class="close-btn" id="closeBtn">✕</div>
                    </div>
                </div>

                <div class="top-actions">
                    <div class="action-tag">👤 Assign</div>
                    <div class="action-tag">📅 Due date</div>
                    <div class="action-tag">➡️ Drug test pending / Driv...</div>
                    <div class="action-tag">#️⃣ Tags</div>
                </div>

                <div id="modalContent"></div>
            </div>

            <div class="modal-right">
                <div class="chat-header">
                    <div class="chat-title">CHAT & ACTIVITY</div>
                </div>
                <div class="chat-messages">
                    <div class="chat-icon">😊</div>
                    <div class="chat-prompt">Let's Discuss?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" placeholder="Add a comment...">
                    <div class="chat-send">➤</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const columns = [
            { id: 'new-leads', title: 'New Leads' },
            { id: 'follow-up', title: 'Follow Up' },
            { id: 'in-progress', title: 'In Progress' },
            { id: 'safety-review', title: 'Safety Review' },
            { id: 'drug-test', title: 'Drug test pending / Driver Setup' },
            { id: 'driver-ready', title: 'Driver Ready' }
        ];

        const leads = [
            { id: 1, name: 'Julio', column: 'new-leads', tags: ['NEW', 'Bad Number'], dots: [0, 0, 0, 0], email: 'julio@example.com', phone: '+1 234 567 8900', category: 'Independent Contractor', homeTown: 'Houston, TX', experience: '3', mileage: '2500', frequency: 'Once per week', certs: 'Hazmat, Tanker', quote: '$85,000/year', license: '', medical: '', ssn: '', truckMake: 'Freightliner', truckModel: 'Cascadia', truckYear: '2020', truckMileage: '125000', dotInspection: '2025-06-15', registration: 'Valid', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '', method: '', liveSetup: '', fedex: '' },
            { id: 2, name: 'Mike', column: 'new-leads', tags: ['NEW'], dots: [0, 0, 0, 0], email: 'mike@example.com', phone: '+1 234 567 8901', category: 'Company Driver', homeTown: 'Dallas, TX', experience: '5', mileage: '3000', frequency: 'Every other week', certs: 'None', quote: '$72,000/year', license: '', medical: '', ssn: '', truckMake: '', truckModel: '', truckYear: '', truckMileage: '', dotInspection: '', registration: '', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '', method: '', liveSetup: '', fedex: '' },
            { id: 3, name: 'Fernando Martinez', column: 'follow-up', tags: ['Follow Up Scheduled'], dots: [1, 0, 0, 0], followUp: '2026-01-25 14:00', email: 'fernando@example.com', phone: '+1 555 123 4567', category: 'Independent Contractor', homeTown: 'San Antonio, TX', experience: '6+', mileage: '2800', frequency: 'Once per week', certs: 'Hazmat', quote: '$90,000/year', license: '', medical: '', ssn: '', truckMake: 'Peterbilt', truckModel: '579', truckYear: '2019', truckMileage: '180000', dotInspection: '2025-08-20', registration: 'Valid', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '', method: '', liveSetup: '', fedex: '' },
            { id: 4, name: 'Mark', column: 'follow-up', tags: ['VM Left'], dots: [1, 0, 0, 0], followUp: '2026-01-22 10:30', email: 'mark@example.com', phone: '+1 555 987 6543', category: 'Company Driver', homeTown: 'Austin, TX', experience: '2', mileage: '2200', frequency: 'Every day', certs: 'None', quote: '$68,000/year', license: '', medical: '', ssn: '', truckMake: '', truckModel: '', truckYear: '', truckMileage: '', dotInspection: '', registration: '', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '', method: '', liveSetup: '', fedex: '' },
            { id: 5, name: 'Pedro', column: 'in-progress', tags: ['Hot Lead'], dots: [1, 1, 0, 0], email: 'pedro@example.com', phone: '+1 555 111 2222', category: 'Independent Contractor', homeTown: 'Fort Worth, TX', experience: '5', mileage: '3200', frequency: 'Once per week', certs: 'Hazmat, Tanker', quote: '$95,000/year', license: '', medical: '', ssn: '', truckMake: 'Kenworth', truckModel: 'W900', truckYear: '2021', truckMileage: '95000', dotInspection: '2026-03-10', registration: 'Valid', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '', method: '', liveSetup: '', fedex: '' },
            { id: 6, name: 'John', column: 'safety-review', tags: ['Safety Pending'], dots: [1, 1, 1, 0], email: 'john@example.com', phone: '+1 555 999 0000', category: 'Independent Contractor', homeTown: 'Waco, TX', experience: '6+', mileage: '2900', frequency: 'Once per week', certs: 'Hazmat, Tanker', quote: '$92,000/year', license: '', medical: '', ssn: '', truckMake: 'Mack', truckModel: 'Anthem', truckYear: '2020', truckMileage: '140000', dotInspection: '2026-01-30', registration: 'Valid', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '', method: '', liveSetup: '', fedex: '' },
            { id: 7, name: 'Mark', column: 'drug-test', tags: [], dots: [1, 1, 1, 1], email: 'mark.a@example.com', phone: '+1 555 222 3333', category: 'Company Driver', homeTown: 'Tyler, TX', experience: '3', mileage: '2300', frequency: 'Every other week', certs: 'None', quote: '$71,000/year', license: '', medical: '', ssn: '', truckMake: '', truckModel: '', truckYear: '', truckMileage: '', dotInspection: '', registration: '', trailerMake: '', trailerModel: '', trailerYear: '', trailerDot: '', trailerReg: '', jobApp: '', mvr: '', clearinghouse: '', driverStatus: '', drugTest: '', driverSetup: '', equipment: '✓', method: '', liveSetup: 'Dallas friday 16th', fedex: '✓' }
        ];

        let draggedLead = null;

        function renderCard(lead) {
            const card = document.createElement('div');
            card.className = 'lead-card';
            card.draggable = true;
            card.dataset.leadId = lead.id;

            const dots = lead.dots.map(d => `<div class="dot ${d ? 'complete' : ''}"></div>`).join('');
            let tags = lead.tags.map(t => {
                let color = 'blue';
                if (t.includes('NEW')) color = 'yellow';
                if (t.includes('Bad') || t.includes('VM')) color = 'red';
                if (t.includes('Safety')) color = 'green';
                return `<span class="tag ${color}">${t}</span>`;
            }).join('');
            
            if (lead.lastEdited && lead.column !== 'new-leads') {
                const now = new Date().getTime();
                if (now - lead.lastEdited < 10 * 60 * 1000) { // 10 minutes
                    tags += `<span class="tag purple">Recently Viewed</span><span class="tag teal">Recently Edited</span>`;
                }
            }

            let meta = '';
            if (lead.followUp) {
                const d = new Date(lead.followUp);
                const now = new Date();
                const overdue = d < now;
                const formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
                    d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                meta = `<div class="meta ${overdue ? 'overdue' : ''}">📅 ${formatted}</div>`;
            }

            card.innerHTML = `
        <div class="lead-header">
          <div class="status-dots">${dots}</div>
          <div class="lead-name">${lead.name}</div>
        </div>
        ${tags ? `<div class="tags">${tags}</div>` : ''}
        ${meta}
      `;

            card.addEventListener('click', () => openModal(lead));
            card.addEventListener('dragstart', (e) => {
                draggedLead = lead;
                card.classList.add('dragging');
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
            });

            return card;
        }

        function renderFunnel() {
            const funnel = document.getElementById('funnel');
            funnel.innerHTML = '';

            columns.forEach(col => {
                const column = document.createElement('div');
                column.className = 'column';
                column.dataset.columnId = col.id;

                const title = document.createElement('div');
                title.className = 'column-title';
                title.textContent = col.title;

                const cards = document.createElement('div');
                cards.className = 'cards';

                leads.filter(l => l.column === col.id).forEach(lead => {
                    cards.appendChild(renderCard(lead));
                });

                column.appendChild(title);
                column.appendChild(cards);

                cards.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    column.classList.add('drag-over');
                });

                cards.addEventListener('dragleave', () => {
                    column.classList.remove('drag-over');
                });

                cards.addEventListener('drop', (e) => {
                    e.preventDefault();
                    column.classList.remove('drag-over');
                    if (draggedLead) {
                        draggedLead.column = col.id;
                        renderFunnel();
                    }
                });

                funnel.appendChild(column);
            });
        }

            document.getElementById('modalBackdrop').classList.add('open');

        function handleDrop(e, type, element) {
            e.preventDefault();
            element.classList.remove('dragover');
            isDirty = true;
            
            if (type === 'cdl') {
                document.querySelector('.cdl-num').value = 'B5551234';
                document.querySelector('.cdl-exp').value = '2028-10-15';
                document.querySelector('.cdl-dob').value = '1985-05-20';
                document.querySelector('.cdl-state').value = 'TX';
                document.querySelector('.cdl-type').value = 'Class A';
                document.querySelector('.cdl-end').value = 'T, N';
                element.style.borderColor = '#10b981';
                element.style.background = 'rgba(16, 185, 129, 0.05)';
            } else if (type === 'medical' || type === 'mvr') {
                const today = new Date().toISOString().split('T')[0];
                element.querySelector('input').value = today;
                element.style.borderColor = '#10b981';
            } else if (type === 'registration') {
                const inputs = element.parentElement.querySelectorAll('input[type="text"]');
                inputs[0].value = 'Freightliner';
                inputs[1].value = '1FUJG6B9XKL123456';
                inputs[2].value = 'Cascadia';
                inputs[3].value = '2021';
                inputs[4].value = 'TX-8942A';
                element.style.borderColor = '#10b981';
            }
        }

        function saveLead(leadId) {
            const lead = leads.find(l => l.id === leadId);
            if (lead) {
                lead.lastEdited = new Date().getTime();
                if (lead.column !== 'new-leads') {
                    const index = leads.findIndex(l => l.id === leadId);
                    if (index > -1) {
                        leads.splice(index, 1);
                        leads.unshift(lead);
                    }
                }
            }
            isDirty = false;
            renderFunnel();
            closeModal();
        }

        function navigateLead(direction) {
            if (isDirty) {
                if (!confirm("Save changes before returning?")) return;
                isDirty = false;
            }
            const newIndex = currentLeadIndex + direction;
            if (newIndex >= 0 && newIndex < currentLeadList.length) {
                openModal(currentLeadList[newIndex]);
            }
        }

        document.getElementById('prevLeadBtn').addEventListener('click', () => navigateLead(-1));
        document.getElementById('nextLeadBtn').addEventListener('click', () => navigateLead(1));

        function closeModal() {
            if (isDirty) {
                if (!confirm("Save changes before returning?")) return;
            }
            isDirty = false;
            document.getElementById('modalBackdrop').classList.remove('open');
        }

        document.getElementById('closeBtn').addEventListener('click', closeModal);
        document.getElementById('modalBackdrop').addEventListener('click', (e) => {
            if (e.target.id === 'modalBackdrop') closeModal();
        });

        renderFunnel();
    </script>
