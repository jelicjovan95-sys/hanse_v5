<style>
.flip-container { perspective: 1000px; width: 500px; }
.flipper { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 200px; }
.flipped .flipper { transform: rotateY(180deg); }
.front, .back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.front { background: red; z-index: 2; transform: rotateY(0deg); }
.back { background: blue; transform: rotateY(180deg); }
</style>
<div class="flip-container" onclick="this.classList.toggle('flipped')">
  <div class="flipper">
    <div class="front">FRONT</div>
    <div class="back">BACK</div>
  </div>
</div>
