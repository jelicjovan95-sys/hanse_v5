<style>
.container { perspective: 1000px; width: 500px; height: 300px; position: relative; }
.front, .back { 
  transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1), opacity 0s linear 0.3s, visibility 0s linear 0.3s;
  width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
}
.front { z-index: 2; transform: rotateX(0deg); opacity: 1; visibility: visible; background: red; }
.back { transform: rotateX(-180deg); opacity: 0; visibility: hidden; background: blue; display: flex; }
.flipped .front { transform: rotateX(180deg); opacity: 0; visibility: hidden; }
.flipped .back { transform: rotateX(0deg); opacity: 1; visibility: visible; }
</style>
<div class="container" onclick="this.classList.toggle('flipped')">
  <div class="front">FRONT</div>
  <div class="back">BACK</div>
</div>
